
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Indie Game — Game Introduction</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- ========== Header / Nav ========== -->
  <header>
    <div class="topbar container">
      <div class="brand">TUNA Company</div>

      <nav aria-label="主導覽" class="main-nav">
        <ul>
          <li><a href="index.html" class="nav-link active">Home</a></li>
          <li><a href="all games.html" class="nav-link">Games</a></li>
          <li class="dropdown">
            <button class="nav-link dropdown-toggle" aria-haspopup="true" aria-expanded="false">
              Introduce
            </button>

            <ul class="dropdown-menu" aria-label="Introduce 子選單">
              <li><a href="introduce.html?game=undertale">UNDERTALE</a></li>
              <li><a href="introduce.html?game=hollowknight">Hollow Knight</a></li>
              <li><a href="introduce.html?game=Hades">Hades</a></li>
              <li><a href="introduce.html?game=Detention">Detention</a></li>
              <li><a href="introduce.html?game=celeste">Celeste</a></li>
              <li><a href="introduce.html?game=TheBindingOfIsaac">The Binding of Isaac</a></li>
            </ul>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- ========== Hero ========== -->
  <section class="hero">
    <img class="hero-img" id="gameHeroImg" src="images/undertale-2.jpg" alt="Hero image" />
    <div class="hero-text">
      <h1 id="gameTitle"></h1>
      <p id="gameSubtitle"></p>
    </div>

    <div class="scroll-hint">
      <p class="scroll-text">Scroll down</p>
      <span class="scroll-arrow">≫</span>
    </div>
  </section>

  <!-- ========== Main Content ========== -->
  <main>
    <!-- ===== Creator / Basic Info ===== -->
    <section class="creator">
      <h2>Independent Game Creator</h2>

      <img class="creator-img" id="gameCreatorImg" src="" alt="Game cover image" />

      <p id="gamedesc"></p>
    </section>

    <!-- ===== Game Introduction Carousel ===== -->
    <section class="introdution is-fullbleed">
      <!-- 螢幕邊淡出遮罩（一定貼邊） -->
      <div class="edge-fade edge-fade-left"></div>
      <div class="edge-fade edge-fade-right"></div>

      <article class="introdution-all">
        <!-- 可視範圍 -->
        <div id="viewport" class="introdution-viewport">
          <!-- 軌道 -->
          <div id="track" class="introdution-track"></div>

        </div>

        <!-- 控制按鈕 -->
        <div class="introdution-controls">
          <button class="btn" id="prev" aria-label="Previous">◀</button>
          <button class="btn" id="next" aria-label="Next">▶</button>
        </div>

        <section class="go-home">
      <a href="all games.html" class="btn-2">back</a>
    </section>
      </article>
    </section>

    


  <!-- ========== Footer ========== -->
  <footer>
    <div class="container">© 2025 TUNA Company. All rights reserved.</div>
  </footer>

  <!-- ========== Scripts ========== -->
  <!-- <script src="carousel.js"></script> -->

  <script src="introduce-data.js"></script>
  <script src="introduce.js"></script>
  <script src="carousel.js"></script>
</body>
</html>
